<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie We- Feedback</title>



<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #FFF9F2;
}


header {
    background: white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    padding: 15px 0;
}

.container {
    width: 90%;
    margin: auto;
}

.logo {
    font-size: 1.6rem;
    font-weight: bold;
    color: #AA2B1D;
}

/* Feedback Section */
.feedback-section {
    padding: 80px 20px;
}

.feedback-box {
    max-width: 750px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    animation: fadeUp 0.8s ease;
}

.feedback-box h2 {
    text-align: center;
    color: #AA2B1D;
    margin-bottom: 30px;
    font-size: 2.2rem;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: 500;
}

input, textarea, select {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

input:focus, textarea:focus, select:focus {
    border: 1px solid #AA2B1D;
    outline: none;
}

.rating {
    margin-top: 10px;
}

.rating input {
    margin-right: 5px;
}

textarea {
    resize: vertical;
    min-height: 100px;
}

button {
    margin-top: 25px;
    padding: 14px;
    width: 100%;
    border: none;
    border-radius: 30px;
    background: #AA2B1D;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #FCB53B;
    color: #000;
    transform: scale(1.03);
}

/* Footer */
footer {
    background: #AA2B1D;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 60px;
}

/* Animation */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media(max-width:768px){
    .feedback-box{
        padding:25px;
    }
}

header {
    background: white;
    position: sticky;
    top: 0;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    z-index: 1000;
}

.container {
    width: 90%;
    margin: auto;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 0;
}
.nav-links {
    list-style: none;
    display: flex;
}

.nav-links a {
    padding: 10px 18px;
    color: #333;
    text-decoration: none;
    font-weight: 500;
    border-radius: 25px;
    transition: 0.3s;
}

.nav-links a:hover {
    background-color: #AA2B1D;
    color: white;
}

.logo {
    display: flex;
    margin-left: -40px;
    align-items: center;
    gap: 10px;
    font-size: 1.7rem;
    font-weight: bold;
    color: #AA2B1D;
    cursor: pointer;
}

</style>
</head>

<body>

<header>
    <div class="container">
        <nav>
            <div class="logo">
                <img src="Gemini_Generated_Image_6fearz6fearz6fea.png" height="50">
                <span>Foodiewe</span>
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="feedback.html">Feedback</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="feedback-section">
    <div class="feedback-box">
        <h2>Customer Feedback</h2>

        <form>

            <label>Name (Optional)</label>
            <input type="text" placeholder="Enter your name">

            <label>Email (Optional)</label>
            <input type="email" placeholder="Enter your email">

            <label>Order ID</label>
            <input type="text" placeholder="Enter your Order ID">

            <label>Overall Experience</label>
            <div class="rating">
                <input type="radio" name="overall"> Excellent
                <input type="radio" name="overall"> Good
                <input type="radio" name="overall"> Average
                <input type="radio" name="overall"> Poor
            </div>

            <label>Food Quality (1-5)</label>
            <div class="rating">
                <input type="radio" name="quality">1
                <input type="radio" name="quality">2
                <input type="radio" name="quality">3
                <input type="radio" name="quality">4
                <input type="radio" name="quality">5
            </div>

            <label>Delivery Experience</label>
            <select>
                <option>On Time</option>
                <option>Slightly Late</option>
                <option>Very Late</option>
            </select>

            <label>What did you like the most?</label>
            <textarea placeholder="Write your feedback..."></textarea>

            <label>What can we improve?</label>
            <textarea placeholder="Your suggestions..."></textarea>

            <button type="submit">Submit Feedback</button>

        </form>
    </div>
</section>

<footer>
    © 2026 Foodie Web | All Rights Reserved
</footer>

</body>
</html>
